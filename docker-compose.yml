services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
